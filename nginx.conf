server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests sang backend Render
    location /api/ {
        proxy_pass https://messing-be-latest.onrender.com;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name messing-be-latest.onrender.com;
        proxy_set_header Host messing-be-latest.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy websocket/STOMP endpoint sang backend Render
    location /ws/ {
        proxy_pass https://messing-be-latest.onrender.com;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name messing-be-latest.onrender.com;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host messing-be-latest.onrender.com;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback cho Vue Router history mode
    location / {
        try_files $uri $uri/ /index.html;
    }
}
